<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Medical System</span>
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-5">
    <div class="card p-4">

        <h3>Book Appointment</h3>

        <form action="/book_appointment" method="POST">

            <!-- Patient -->
            <label class="form-label">Patient</label>
            <select name="patient_id" class="form-control mb-3" required>
                {% for p in patients %}
                <option value="{{ p['patient_id'] }}">{{ p['name'] }}</option>
                {% endfor %}
            </select>

            <!-- Doctor -->
            <label class="form-label">Doctor</label>
            <select name="doctor_id" class="form-control mb-3" required>
                {% for d in doctors %}
                <option value="{{ d['doctor_id'] }}">
                    {{ d['name'] }} ({{ d['specialization'] }})
                </option>
                {% endfor %}
            </select>

            <!-- Date -->
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control mb-3" required>

            <!-- Time -->
            <label class="form-label">Time</label>
            <input type="time" name="time" class="form-control mb-3" required>

            <button class="btn btn-primary w-100">Book Appointment</button>
        </form>

        <hr>

        <a href="/appointments" class="btn btn-success">View Appointments</a>
        <a href="/" class="btn btn-secondary">Home</a>

    </div>
</div>

</body>
</html>
