<!DOCTYPE html>
<html>
<head>
    <title>Register Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Medical System</span>

    <div>
        {% if session.get('role') == 'admin' %}
            <a href="/admin" class="btn btn-warning btn-sm">Admin</a>
        {% endif %}

        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4">
        <h3>Register Patient</h3>
        <form action="/register" method="POST">
            <input type="text" name="name" class="form-control mb-2" placeholder="Name" required>
<input type="number" name="age" class="form-control mb-2" placeholder="Age" required>
<input type="text" name="gender" class="form-control mb-2" placeholder="Gender" required>
<input type="text" name="phone" class="form-control mb-2" placeholder="Phone">
<input type="email" name="email" class="form-control mb-2" placeholder="Email">
            <input type="date" name="registration_date" class="form-control mb-2">


            <button class="btn btn-primary w-100">Register</button>
        </form>

        <hr>
        <a href="/patients" class="btn btn-info">View Patients</a>
        <a href="/book" class="btn btn-success">Book Appointment</a>

    </div>
</div>

</body>
</html>
